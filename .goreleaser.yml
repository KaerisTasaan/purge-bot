# GoReleaser: build for linux/amd64 only (CGO/sqlite; native build on runner).
version: 2

project_name: purgebot

builds:
  - id: purgebot
    main: ./cmd/purgebot
    ldflags:
      - -X github.com/keshon/purge-bot/internal/version.Version={{.Version}}
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64

archives:
  - formats: [tar.gz]

checksum:
  name_template: checksums.txt
