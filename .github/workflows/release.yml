# Single release path: from push to main (after CI) or from tag push / manual run.
# - Push to main: wait for CI → bump & tag from conventional commits → fetch tag → GoReleaser.
# - Push tag v*: checkout tag → GoReleaser (bootstrap or one-off).
# - Manual run: Actions → Release → Run workflow → enter tag → GoReleaser.
name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Required when run manually.'
        required: true

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || (github.event_name == 'push' && github.ref_type == 'tag' && github.ref_name) || github.ref }}
          fetch-depth: 0

      - name: Wait for CI to pass
        if: github.event_name == 'push' && github.ref_type != 'tag'
        id: wait-ci
        uses: ArcticLampyrid/action-wait-for-workflow@v1
        with:
          workflow: ci.yml
          wait-interval: 15

      - name: Bump version and tag
        if: github.event_name == 'push' && github.ref_type != 'tag'
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false
          tag_prefix: v

      - name: Fetch new tag
        if: github.event_name == 'push' && github.ref_type != 'tag' && steps.tag.outputs.new_tag != ''
        run: git fetch origin tag ${{ steps.tag.outputs.new_tag }}

      - name: Set up Go
        if: steps.tag.outputs.new_tag != '' || github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Run GoReleaser
        if: steps.tag.outputs.new_tag != '' || github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.tag.outputs.new_tag || github.ref_name || inputs.tag }}
