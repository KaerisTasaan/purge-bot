# Lint and test on push/PR. Module root is repo root (go.mod at top level).
name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1
          args: ./...

      - name: deadcode (unreachable functions)
        run: |
          out=$(go run golang.org/x/tools/cmd/deadcode@latest -test ./... 2>&1) || true
          echo "$out"
          if echo "$out" | grep -q "unreachable func"; then
            echo "::error::Unreachable functions found (see output above)"
            exit 1
          fi
          echo "No unreachable functions found."

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: go mod verify
        run: go mod download && go mod verify

      - name: test
        run: go test -v ./... -count=1
